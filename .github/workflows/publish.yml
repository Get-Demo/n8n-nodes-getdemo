# Publishes this n8n community node package to npm on every version tag push.
#
# Starting May 1 2026, n8n requires all community nodes to be published via
# GitHub Actions with npm provenance statements. This workflow satisfies that
# requirement. Provenance lets anyone cryptographically verify that a package
# was built by this exact workflow, from this exact repository and commit.
#
# ─── PREREQUISITES ─────────────────────────────────────────────────────────────
#
# @n8n/node-cli ≥ 0.23.0 is required. Earlier versions do not support the
# provenance flag passed by `npm run release` in CI, and the publish step will
# fail. Check the version installed in this project with:
#
#   npm list @n8n/node-cli
#
# To upgrade:
#
#   npm install --save-dev @n8n/node-cli@latest
#
# ─── ONE-TIME SETUP ────────────────────────────────────────────────────────────
#
# Option A — OIDC Trusted Publishing (recommended, no long-lived secrets):
#   1. Log in to npmjs.com and open your package's settings.
#   2. Under "Publish access" → "Trusted Publishers", click "Add a publisher".
#   3. Select GitHub Actions and fill in:
#        Repository owner: Get-Demo
#        Repository name: n8n-nodes-getdemo
#        Workflow name: publish.yml
#        Environment: (leave blank unless you use GitHub Environments)
#   4. In GitHub: remove repository secret NPM_TOKEN if it exists (empty/wrong
#      token forces classic auth and breaks OIDC with a misleading E404).
#
# Option B — npm Automation Token (fallback):
#   1. On npmjs.com: Access Tokens → Generate New Token → Granular Access Token.
#      Scope it to this package with "Read and write" publish permission.
#   2. In GitHub: Settings → Secrets and variables → Actions → New secret.
#      Name it NPM_TOKEN and paste the token value.
#
# Both options work with --provenance. Provenance is signed by GitHub's OIDC
# infrastructure regardless of how npm authentication is handled.
#
# ─── TAG CONVENTION ────────────────────────────────────────────────────────────
#
# Matches semver tags with or without "v" (release-it often creates v0.1.0).
#
# ─── NODE / NPM ────────────────────────────────────────────────────────────────
#
# Trusted Publishing (OIDC) requires a recent npm CLI (≥11.5.x). Node 22 ships
# npm 10 and may surface a misleading 404 on publish; use Node 24+ here.
# See: https://docs.npmjs.com/trusted-publishers/
#
# ENEEDAUTH ("npm adduser"): setup-node's registry-url makes npm expect
# NODE_AUTH_TOKEN for registry.npmjs.org. With no/expired token, npm does NOT
# fall back to OIDC — unset NODE_AUTH_TOKEN and avoid registry-url when using
# Trusted Publishing only. See https://docs.npmjs.com/trusted-publishers/
#
# Also validate package.json repository.url matches this repo (git+https://...).
#
# ─── RELEASE PROCESS ───────────────────────────────────────────────────────────
#
# Run the following command locally to start an interactive release:
#
#   npm run release
#
# This will lint, build, prompt for a version bump, update the changelog,
# commit, tag, and push — which triggers this workflow to publish to npm.

name: Publish

on:
  push:
    tags:
      - '*.*.*'
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Do NOT set registry-url here when using Trusted Publishing (OIDC). That
      # option wires npm to NODE_AUTH_TOKEN; without it npm stops with ENEEDAUTH
      # instead of exchanging the GitHub OIDC token. Use NPM_TOKEN secret path below
      # if you need classic auth + optional registry-url.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      # If NPM_TOKEN is set (even wrong/expired), npm uses it and OIDC Trusted
      # Publishing is NOT used → misleading E404 on PUT. For Trusted Publishers
      # only: delete the NPM_TOKEN repo secret. Otherwise use a granular token
      # with "Read and write" on package n8n-nodes-getdemo.
      - name: Release
        run: |
          set -e
          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "npm publish auth: NPM_TOKEN secret is set (granular/automation token)."
            npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          else
            echo "npm publish auth: NPM_TOKEN unset — using Trusted Publishing (OIDC)."
            npm config delete //registry.npmjs.org/:_authToken 2>/dev/null || true
            unset NODE_AUTH_TOKEN
          fi
          npm --version
          npm run release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
