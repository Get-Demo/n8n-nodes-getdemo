# Publishes this n8n community node package to npm on every version tag push.
#
# Starting May 1 2026, n8n requires all community nodes to be published via
# GitHub Actions with npm provenance statements. This workflow satisfies that
# requirement using npm Trusted Publishing (OIDC) — no long-lived tokens.
#
# ─── ONE-TIME SETUP ────────────────────────────────────────────────────────────
#
# 1. On npmjs.com → package settings → "Trusted Publishers" → Add publisher:
#      Provider:         GitHub Actions
#      Repository owner: Get-Demo
#      Repository name:  n8n-nodes-getdemo
#      Workflow name:    publish.yml
#      Environment:      (leave blank)
#
# 2. In GitHub: ensure NO `NPM_TOKEN` secret exists on this repo. Even an
#    empty/wrong token makes npm prefer classic auth and skip OIDC, producing
#    misleading 401/403 errors. This workflow no longer reads NPM_TOKEN.
#
# ─── REQUIREMENTS ──────────────────────────────────────────────────────────────
#
# - @n8n/node-cli ≥ 0.23.0 (passes --provenance through n8n-node release).
# - Node 24 / npm CLI ≥ 11.5 (older npm does not support Trusted Publishing
#   and surfaces a misleading 404 on PUT).
# - package.json `repository.url` must match this repo (git+https://...).
#
# ─── RELEASE PROCESS ───────────────────────────────────────────────────────────
#
# Locally, start an interactive release:
#
#   npm run release
#
# It lints, builds, bumps the version, commits, tags, and pushes — which
# triggers this workflow. The workflow re-runs `npm run release` in CI; that
# detects the tag, skips the bump, and publishes via OIDC with provenance.

name: Publish

on:
  push:
    tags:
      - '*.*.*'
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # Do NOT set registry-url here. setup-node's registry-url forces npm to
      # use NODE_AUTH_TOKEN and disables OIDC Trusted Publishing.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      # OIDC Trusted Publishing: npm CLI ≥ 11.5 detects ACTIONS_ID_TOKEN_*
      # env vars (provided by `id-token: write`), exchanges them with the npm
      # registry, and publishes with provenance. No NPM_TOKEN involved.
      - name: Release
        run: |
          set -e
          npm config delete //registry.npmjs.org/:_authToken 2>/dev/null || true
          unset NODE_AUTH_TOKEN NPM_TOKEN
          echo "npm $(npm --version) — publishing via Trusted Publishing (OIDC)"
          npm run release
